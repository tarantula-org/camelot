name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Initialize Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          gcc --version

      - name: Verify Code Style (Tabs Only)
        run: |
          bad=$(find . -type f \( -name "*.c" -o -name "*.h" \) \
            -not -path "./vendor/*" \
            -not -path "./build/*" \
            -not -path "./.git/*" \
            -exec grep -Pln '^\t* [^*]' {} \;)
          if [ -n "$bad" ]; then
            echo "ERROR: The following files use spaces for indentation instead of tabs:"
            echo "$bad"
            exit 1
          fi

      - name: Static Analysis (CppCheck)
        run: |
          cppcheck --error-exitcode=1 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            --std=c23 \
            .

      - name: Build
        run: make

      - name: Run Tests
        run: make test